<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeepLearn RAG</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #080810;
      --surface:   #0f0f1c;
      --surface2:  #16162a;
      --border:    #1e1e38;
      --accent:    #7c6af7;
      --accent2:   #f76ab4;
      --text:      #e2e2f0;
      --muted:     #5a5a7a;
      --user-bg:   #1a1a32;
      --ai-bg:     #0f0f1c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(247,106,180,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,16,0.85);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.02em;
    }

    .header-text p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3d3d5c;
      flex-shrink: 0;
      transition: background 0.4s;
      box-shadow: 0 0 0 0 transparent;
    }
    .status-dot.online {
      background: #a6e3a1;
      box-shadow: 0 0 8px rgba(166,227,161,0.5);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 8px rgba(166,227,161,0.5); }
      50%      { box-shadow: 0 0 16px rgba(166,227,161,0.8); }
    }

    /* ── CHAT AREA ── */
    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #chatArea::-webkit-scrollbar { width: 4px; }
    #chatArea::-webkit-scrollbar-track { background: transparent; }
    #chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── WELCOME SCREEN ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 40px 20px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome-icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 20px rgba(124,106,247,0.4));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .welcome-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .welcome-sub {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
    }

    /* Suggested questions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 560px;
      margin-top: 8px;
    }

    .suggestion-chip {
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124,106,247,0.08);
      transform: translateY(-1px);
    }

    /* ── MESSAGES ── */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.3s ease both;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, #2d2d52, #3d3d72);
    }

    .msg.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.93rem;
      line-height: 1.7;
      max-width: calc(100% - 50px);
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .msg.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    /* Streaming cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Chunks badge inside AI bubble */
    .chunks-info {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chunks-badge {
      background: rgba(124,106,247,0.15);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
    }

    /* Error bubble */
    .bubble.error {
      background: rgba(243,139,168,0.08);
      border-color: rgba(243,139,168,0.3);
      color: #f38ba8;
    }

    /* Thinking dots */
    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }
    .thinking span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30%          { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 12px 16px 16px;
      background: rgba(8,8,16,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(124,106,247,0.5);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
    }

    textarea#userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
      padding: 2px 0;
    }

    textarea#userInput::placeholder { color: var(--muted); }

    #sendBtn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      color: white;
      font-size: 16px;
    }
    #sendBtn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 8px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">🧠</div>
    <div class="header-text">
      <h1>DeepLearn RAG</h1>
      <p>Ask anything about your Deep Learning textbook</p>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <!-- CHAT -->
  <div id="chatArea">
    <!-- Welcome screen -->
    <div id="welcome">
      <div class="welcome-icon">🧠</div>
      <div class="welcome-title">Ready to answer your questions</div>
      <div class="welcome-sub">
        Ask anything from your Deep Learning book — backprop, CNNs, transformers, optimizers…
      </div>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="suggest(this)">What is backpropagation?</button>
        <button class="suggestion-chip" onclick="suggest(this)">Explain gradient descent</button>
        <button class="suggestion-chip" onclick="suggest(this)">What are CNNs used for?</button>
        <button class="suggestion-chip" onclick="suggest(this)">How does dropout work?</button>
        <button class="suggestion-chip" onclick="suggest(this)">What is the vanishing gradient problem?</button>
        <button class="suggestion-chip" onclick="suggest(this)">Explain attention mechanism</button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Ask about deep learning… (Enter to send, Shift+Enter for new line)"
      ></textarea>
      <button id="sendBtn" onclick="sendMessage()" title="Send">↑</button>
    </div>
    <div class="input-hint">Answers are grounded in DLBook.docx — no hallucinations outside the document</div>
  </div>

<script>
  const API       = "http://localhost:8000";
  const chatArea  = document.getElementById("chatArea");
  const welcome   = document.getElementById("welcome");
  const userInput = document.getElementById("userInput");
  const sendBtn   = document.getElementById("sendBtn");
  const statusDot = document.getElementById("statusDot");

  let isStreaming = false;

  // ── Auto-resize textarea ───────────────────────
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
  });

  // ── Enter to send ──────────────────────────────
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Suggestion chip click ──────────────────────
  function suggest(el) {
    userInput.value = el.textContent;
    userInput.dispatchEvent(new Event("input"));
    sendMessage();
  }

  // ── Add message bubble ─────────────────────────
  function addMessage(role, content = "") {
    // Hide welcome on first message
    if (welcome) welcome.style.display = "none";

    const msg    = document.createElement("div");
    msg.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "👤" : "🧠";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    scrollBottom();

    return bubble;
  }

  // ── Thinking indicator ─────────────────────────
  function addThinking() {
    if (welcome) welcome.style.display = "none";

    const msg    = document.createElement("div");
    msg.className = "msg ai";
    msg.id = "thinking-msg";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🧠";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    scrollBottom();
    return msg;
  }

  // ── Scroll to bottom ───────────────────────────
  function scrollBottom() {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: "smooth" });
  }

  // ── Main send function ─────────────────────────
  async function sendMessage() {
    const question = userInput.value.trim();
    if (!question || isStreaming) return;

    // Add user bubble
    addMessage("user", question);

    // Clear input
    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;
    isStreaming = true;

    // Thinking indicator
    const thinkingEl = addThinking();

    try {
      const response = await fetch(`${API}/ask`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });

      // Remove thinking
      thinkingEl.remove();

      if (!response.ok) {
        const err = await response.json();
        const bubble = addMessage("ai", "").closest
          ? (() => {
              const b = addMessage("ai", "");
              b.classList.add("error");
              b.textContent = ` ${err.detail || "Server error"}`;
              return b;
            })()
          : null;
        return;
      }

      const data = await response.json();
      // data = { question, answer, chunks_retrieved }

      // Add AI bubble — stream the text
      const aiBubble = addMessage("ai", "");

      // Add streaming cursor
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      aiBubble.appendChild(cursor);

      // Stream text char by char (simulate — real answer aa chuka hai)
      // For real streaming, FastAPI mein StreamingResponse chahiye
      // Abhi ke liye word-by-word simulate kar rahe hain
      const words   = data.answer.split(" ");
      let   current = "";

      await new Promise((resolve) => {
        let i = 0;
        const interval = setInterval(() => {
          if (i >= words.length) {
            clearInterval(interval);
            resolve();
            return;
          }
          current += (i === 0 ? "" : " ") + words[i];
          aiBubble.textContent = current;
          aiBubble.appendChild(cursor);
          i++;
          scrollBottom();
        }, 8); // speed — ms per word
      });

      // Remove cursor
      cursor.remove();
      aiBubble.textContent = data.answer;

      // Add chunks info
      const info = document.createElement("div");
      info.className = "chunks-info";
      info.innerHTML = `
        <span>Sources</span>
        <span class="chunks-badge">${data.chunks_retrieved} chunks</span>
        <span style="margin-left:auto">DLBook.docx</span>
      `;
      aiBubble.appendChild(info);
      scrollBottom();

    } catch (err) {
      thinkingEl.remove();
      const b = addMessage("ai", `Server nahi mila. Uvicorn chal raha hai?`);
      b.classList.add("error");
    } finally {
      sendBtn.disabled = false;
      isStreaming = false;
      userInput.focus();
    }
  }

  // ── Server health check on load ────────────────
  async function checkServer() {
    try {
      const res  = await fetch(`${API}/`);
      const data = await res.json();
      if (data.graph) {
        statusDot.classList.add("online");
      }
    } catch {
      statusDot.style.background = "#f38ba8";
    }
  }

  checkServer();
</script>

</body>
</html>
